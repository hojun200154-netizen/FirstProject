<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 운동 매니저</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { min-height: 80px; transition: all 0.2s; }
        .day-cell:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .checked-item { text-decoration: line-through; color: #94a3b8; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Login Section -->
    <div id="login-section" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-80 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">운동 매니저 로그인</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">아이디</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="user">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">비밀번호</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">로그인</button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden">아이디 또는 비밀번호가 틀렸습니다.</p>
            </div>
        </div>
    </div>

    <!-- Main App Section (Hidden until login) -->
    <div id="app-section" class="hidden min-h-screen pb-12">
        <!-- Header -->
        <header class="bg-white border-b sticky top-0 z-10">
            <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="text-2xl">🔥</span> 나의 운동 루틴
                </h2>
                <button onclick="handleLogout()" class="text-sm text-slate-500 hover:text-red-500">로그아웃</button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 mt-6">
            <!-- Today's Checklist -->
            <section class="bg-white rounded-2xl shadow-sm border p-6 mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-slate-700">오늘의 할 일 - <span id="current-date-display"></span></h3>
                    <div id="daily-progress" class="text-blue-600 font-bold">0% 완료</div>
                </div>
                <div id="checklist-container" class="space-y-3">
                    <!-- Exercise items will be injected here -->
                </div>
            </section>

            <!-- Monthly Calendar View -->
            <section class="bg-white rounded-2xl shadow-sm border p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold text-slate-700" id="calendar-title">2024년 4월</h3>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-lg">◀</button>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-lg">▶</button>
                    </div>
                </div>
                <div class="calendar-grid mb-2">
                    <div class="text-center text-xs font-bold text-red-500">일</div>
                    <div class="text-center text-xs font-bold text-slate-400">월</div>
                    <div class="text-center text-xs font-bold text-slate-400">화</div>
                    <div class="text-center text-xs font-bold text-slate-400">수</div>
                    <div class="text-center text-xs font-bold text-slate-400">목</div>
                    <div class="text-center text-xs font-bold text-slate-400">금</div>
                    <div class="text-center text-xs font-bold text-blue-500">토</div>
                </div>
                <div id="calendar-body" class="calendar-grid">
                    <!-- Days will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- State Management ---
        const EXERCISES = [
            { id: 'pushup', name: '팔굽혀펴기 50회', icon: '💪' },
            { id: 'stairs', name: '계단 오르기', icon: '🪜' },
            { id: 'running', name: '러닝 5Km', icon: '🏃' },
            { id: 'squat', name: '스쿼트 50회', icon: '🏋️' }
        ];

        let currentUser = null;
        let viewDate = new Date();
        let workoutData = JSON.parse(localStorage.getItem('workout_data') || '{}');

        // --- Auth Logic ---
        function handleLogin() {
            const idInput = document.getElementById('username').value;
            const pwInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            if (idInput === 'user' && pwInput === 'userpass') {
                currentUser = 'user';
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                initApp();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }

        // --- Core Logic ---
        function initApp() {
            updateDateDisplay();
            renderChecklist();
            renderCalendar();
        }

        function updateDateDisplay() {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date-display').innerText = today.toLocaleDateString('ko-KR', options);
        }

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        function toggleExercise(id) {
            const key = getTodayKey();
            if (!workoutData[key]) workoutData[key] = {};
            
            workoutData[key][id] = !workoutData[key][id];
            localStorage.setItem('workout_data', JSON.stringify(workoutData));
            
            renderChecklist();
            renderCalendar();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const key = getTodayKey();
            const todayStats = workoutData[key] || {};
            
            let completedCount = 0;
            
            container.innerHTML = EXERCISES.map(ex => {
                const isChecked = todayStats[ex.id] || false;
                if(isChecked) completedCount++;
                
                return `
                    <div onclick="toggleExercise('${ex.id}')" class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-slate-50 transition ${isChecked ? 'bg-blue-50 border-blue-200' : 'bg-white'}">
                        <div class="w-6 h-6 border-2 rounded flex items-center justify-center mr-4 ${isChecked ? 'bg-blue-600 border-blue-600' : 'border-slate-300'}">
                            ${isChecked ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="text-lg ${isChecked ? 'checked-item' : 'font-medium text-slate-700'}">${ex.icon} ${ex.name}</span>
                    </div>
                `;
            }).join('');

            const progressPercent = Math.round((completedCount / EXERCISES.length) * 100);
            document.getElementById('daily-progress').innerText = `${progressPercent}% 완료`;
        }

        // --- Calendar Logic ---
        function renderCalendar() {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            
            document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            const container = document.getElementById('calendar-body');
            container.innerHTML = '';

            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="p-2 border border-transparent"></div>`;
            }

            // Day cells
            for (let d = 1; d <= lastDate; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayData = workoutData[dateKey] || {};
                const completedCount = Object.values(dayData).filter(v => v === true).length;
                const isPerfect = completedCount === EXERCISES.length;
                
                const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();

                container.innerHTML += `
                    <div class="day-cell border rounded-lg p-1 bg-white flex flex-col items-center justify-between relative ${isToday ? 'ring-2 ring-blue-400' : ''}">
                        <span class="text-xs font-semibold ${isToday ? 'text-blue-600' : 'text-slate-500'}">${d}</span>
                        <div class="flex flex-wrap gap-0.5 justify-center mt-1">
                            ${EXERCISES.map(ex => {
                                const done = dayData[ex.id];
                                return `<div class="w-1.5 h-1.5 rounded-full ${done ? 'bg-blue-500' : 'bg-slate-100'}"></div>`;
                            }).join('')}
                        </div>
                        ${isPerfect ? '<span class="absolute top-0 right-0 transform translate-x-1/3 -translate-y-1/3 text-xs">⭐</span>' : ''}
                        <span class="text-[10px] mt-1 text-slate-400">${completedCount}/${EXERCISES.length}</span>
                    </div>
                `;
            }
        }

        function changeMonth(offset) {
            viewDate.setMonth(viewDate.getMonth() + offset);
            renderCalendar();
        }

        // Handle enter key on login
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

    </script>
</body>
</html>
